<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>❤️ Galaxy Clash</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{
  width:100%;height:100%;
  background:#000;color:#fff;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
  /* NO touch-action:none aquí — bloquea clics en setup */
}

/* Fondo galaxia */
#bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 20% 50%,#1a0533 0%,transparent 60%),
    radial-gradient(ellipse at 80% 20%,#0a1a3e 0%,transparent 55%),
    radial-gradient(ellipse at 60% 80%,#0d0a2e 0%,transparent 50%),
    #000;
}
#stars{position:fixed;inset:0;z-index:0;}
#stars::before,#stars::after{
  content:'';position:absolute;
  width:2px;height:2px;border-radius:50%;background:transparent;
  box-shadow:
    12px 45px #fff,87px 234px #fff,145px 67px #ddd,300px 190px #fff,
    420px 310px #ccc,560px 55px #fff,680px 420px #ddd,750px 130px #fff,
    830px 280px #ccc,920px 370px #fff,50px 500px #ddd,200px 600px #fff,
    370px 450px #ccc,490px 580px #fff,620px 490px #ddd,780px 560px #fff,
    100px 150px #ddd,250px 380px #fff,400px 220px #ccc,550px 340px #fff,
    700px 90px #ddd,850px 450px #fff,960px 200px #ccc,30px 700px #fff,
    170px 750px #ddd,320px 680px #fff,470px 730px #ccc,600px 650px #fff,
    55px 320px #ddd,210px 270px #fff,360px 130px #ccc,510px 400px #fff,
    115px 100px #fff,265px 50px #ccc,415px 170px #fff,565px 80px #ddd;
  animation:twinkle 4s infinite alternate;
}
#stars::after{width:1px;height:1px;animation-delay:2s;
  box-shadow:80px 120px #aaa,230px 80px #bbb,380px 200px #aaa,530px 140px #bbb,
    680px 60px #aaa,820px 240px #bbb,185px 320px #aaa,335px 420px #bbb,
    485px 270px #aaa,635px 380px #bbb,785px 330px #aaa,60px 560px #aaa;}
@keyframes twinkle{from{opacity:.3}to{opacity:1}}

/* ══ SETUP ══ */
#setup{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:22px;
  background:rgba(0,0,0,.9);
  backdrop-filter:blur(8px);
}
#setup h1{
  font-size:clamp(1.8rem,7vw,3rem);
  background:linear-gradient(135deg,#ff4d6d,#a855f7,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;
}
#setup p{color:#999;font-size:.83rem;text-align:center;max-width:270px}

.pickers{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.picker{display:flex;flex-direction:column;align-items:center;gap:8px}
.picker span{font-size:.68rem;color:#aaa;text-transform:uppercase;letter-spacing:.1em}

/* Botón de elegir imagen — funciona en móvil */
.pickbtn{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;
}
.thumb{
  width:76px;height:76px;border-radius:14px;
  border:2px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;overflow:hidden;
  transition:border-color .2s;
  position:relative;
}
.thumb:hover,.thumb:active{border-color:rgba(255,255,255,.5)}
.thumb img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;inset:0}
.thumb img.on{display:block}
.thumb .icon{transition:opacity .2s}
.thumb img.on ~ .icon{display:none}

.plabel{
  font-size:.72rem;color:#bbb;
  padding:5px 12px;border-radius:8px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.07);
}
input[type=file]{display:none}

#startBtn{
  margin-top:4px;
  padding:14px 48px;
  background:linear-gradient(135deg,#ff4d6d,#a855f7);
  border:none;border-radius:16px;
  color:#fff;font-size:1.05rem;font-weight:700;
  cursor:pointer;letter-spacing:.05em;
  box-shadow:0 4px 24px rgba(168,85,247,.5);
  transition:transform .12s,box-shadow .2s;
  touch-action:manipulation; /* permite tap rápido en móvil */
}
#startBtn:hover{transform:scale(1.05)}
#startBtn:active{transform:scale(.97)}

/* ══ JUEGO ══ */
#game{
  display:none;position:fixed;inset:0;z-index:10;
  flex-direction:column;align-items:center;
}
#game.on{display:flex}

/* HUD */
#hud{
  width:100%;max-width:500px;
  display:flex;gap:8px;
  padding:8px 10px 4px;flex-shrink:0;
}
.stat{
  flex:1;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:5px 10px;
}
.slabel{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:#888;margin-bottom:3px}
.barbg{height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.bar{height:100%;border-radius:4px;transition:width .25s}
#pBar{background:linear-gradient(90deg,#ff4d6d,#ff8fa3);width:100%}
#eBar{background:linear-gradient(90deg,#a855f7,#d8b4fe);width:100%}

/* Canvas */
#canvas{
  display:block;border-radius:14px;
  border:1px solid rgba(255,255,255,.07);
  box-shadow:0 0 40px rgba(168,85,247,.12);
  flex-shrink:0;max-width:100%;
}

/* Controles táctiles */
#ctrl{
  width:100%;max-width:500px;
  flex:1;
  display:flex;align-items:center;
  justify-content:space-between;
  padding:8px 18px 10px;
  touch-action:none; /* solo aquí bloqueamos para el joystick */
}

/* Joystick */
#jWrap{position:relative;width:114px;height:114px;flex-shrink:0}
#jBase{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(255,255,255,.07);
  border:2px solid rgba(255,255,255,.15);
}
#jKnob{
  position:absolute;width:46px;height:46px;border-radius:50%;
  background:rgba(255,255,255,.22);
  border:2px solid rgba(255,255,255,.4);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 12px rgba(255,255,255,.1);
  pointer-events:none;
}

/* Botón disparar */
#fire{
  width:82px;height:82px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,77,109,.6),rgba(168,85,247,.4));
  border:2px solid rgba(255,100,120,.5);
  color:#fff;font-size:1.6rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  box-shadow:0 0 24px rgba(255,77,109,.35);
  touch-action:manipulation;
  transition:transform .08s;
}
#fire.on{transform:scale(.9);background:radial-gradient(circle,rgba(255,77,109,.85),rgba(168,85,247,.7))}

/* Hint teclado */
#hint{
  position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  font-size:.58rem;color:rgba(255,255,255,.18);white-space:nowrap;pointer-events:none;
}

/* Game Over */
#over{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.86);backdrop-filter:blur(10px);
  flex-direction:column;align-items:center;justify-content:center;gap:18px;
}
#over.on{display:flex}
#overTitle{font-size:clamp(2rem,9vw,3.8rem);font-weight:800;text-align:center}
#overTitle.win{color:#a855f7;text-shadow:0 0 40px #a855f755}
#overTitle.lose{color:#ff4d6d;text-shadow:0 0 40px #ff4d6d55}
#overSub{color:#aaa;font-size:.9rem}
#reBtn{
  padding:12px 38px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.25);border-radius:12px;
  color:#fff;font-size:.95rem;cursor:pointer;
  touch-action:manipulation;transition:background .2s;
}
#reBtn:hover{background:rgba(255,255,255,.2)}
</style>
</head>
<body>
<div id="bg"></div>
<div id="stars"></div>

<!-- ══ SETUP ══ -->
<div id="setup">
  <h1>❤️ Galaxy Clash</h1>
  <p>Elige imágenes para tu personaje y el enemigo, ¡luego a combatir!</p>

  <div class="pickers">
    <!-- Jugador -->
    <div class="picker">
      <span>🧑 Jugador</span>
      <div class="pickbtn" onclick="document.getElementById('fp').click()">
        <div class="thumb" id="tP">
          <img id="iP" alt=""><span class="icon">🧑</span>
        </div>
        <div class="plabel">📁 Elegir imagen</div>
      </div>
      <input type="file" id="fp" accept="image/*">
    </div>
    <!-- Enemigo -->
    <div class="picker">
      <span>👾 Enemigo</span>
      <div class="pickbtn" onclick="document.getElementById('fe').click()">
        <div class="thumb" id="tE">
          <img id="iE" alt=""><span class="icon">👾</span>
        </div>
        <div class="plabel">📁 Elegir imagen</div>
      </div>
      <input type="file" id="fe" accept="image/*">
    </div>
  </div>

  <button id="startBtn">🚀 ¡Jugar!</button>
</div>

<!-- ══ JUEGO ══ -->
<div id="game">
  <div id="hud">
    <div class="stat">
      <div class="slabel">❤️ Jugador</div>
      <div class="barbg"><div class="bar" id="pBar"></div></div>
    </div>
    <div class="stat">
      <div class="slabel">💀 Enemigo</div>
      <div class="barbg"><div class="bar" id="eBar"></div></div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <div id="ctrl">
    <div id="jWrap">
      <div id="jBase"></div>
      <div id="jKnob"></div>
    </div>
    <button id="fire">❤️</button>
  </div>

  <div id="hint">PC: WASD / flechas · Espacio para disparar</div>
</div>

<!-- ══ GAME OVER ══ -->
<div id="over">
  <div id="overTitle"></div>
  <div id="overSub"></div>
  <button id="reBtn">🔄 Reiniciar</button>
</div>

<script>
// ─── IMÁGENES ────────────────────────────────────────────────
let imgP = null, imgE = null;

function setupFile(inputId, imgElId, cb){
  document.getElementById(inputId).addEventListener('change', function(){
    const f = this.files[0];
    if(!f) return;
    const url = URL.createObjectURL(f);
    const img = new Image();
    img.onload = function(){
      const el = document.getElementById(imgElId);
      el.src = url;
      el.classList.add('on');
      cb(img);
    };
    img.src = url;
  });
}
setupFile('fp','iP', img => imgP = img);
setupFile('fe','iE', img => imgE = img);

// ─── BOTÓN JUGAR ─────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', startGame);

function startGame(){
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').classList.add('on');
  initGame();
}

// ─── CANVAS ──────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W, H;

function resize(){
  const vw   = Math.min(window.innerWidth, 500);
  const avail = window.innerHeight - 50 - 132 - 20; // hud + ctrl + hint
  W = vw;
  H = Math.min(Math.round(vw * 0.62), Math.max(avail, 150));
  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = W+'px';
  canvas.style.height = H+'px';
}
window.addEventListener('resize', resize);

// ─── CONSTANTES ──────────────────────────────────────────────
const SZ      = 40;   // tamaño personaje
const PSPD    = 3.2;  // velocidad jugador
const PHP     = 6;    // vida jugador
const EHP     = 10;   // vida enemigo
const PSCD    = 320;  // cooldown disparo jugador (ms)
const ESCD    = 1300; // cooldown disparo enemigo (ms)

// ─── ESTADO ──────────────────────────────────────────────────
let player, enemy, pBulls, eBulls;
let pCd, eCd, state, running, rafId, lastTs;

function initGame(){
  resize();
  player = { x:W/2-SZ/2, y:H-SZ-6, w:SZ, h:SZ, hp:PHP, maxHp:PHP, inv:0 };
  enemy  = { x:W/2-SZ/2, y:8,       w:SZ, h:SZ, hp:EHP, maxHp:EHP, inv:0,
             vx:1.6, vy:0, dtimer:0 };
  pBulls = []; eBulls = [];
  pCd = 0; eCd = 900;
  state = 'play'; running = true; lastTs = 0;
  updateBars();
  if(rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(loop);
}

// ─── TECLADO ─────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e=>{
  keys[e.code]=true;
  // Prevenir scroll solo durante el juego
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)
     && state==='play') e.preventDefault();
});
window.addEventListener('keyup', e=>{ keys[e.code]=false; });

// ─── JOYSTICK ────────────────────────────────────────────────
const jWrap = document.getElementById('jWrap');
const jKnob = document.getElementById('jKnob');
const JR=57, KR=23;
let jOn=false, jId=-1, jdx=0, jdy=0;

jWrap.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  jId=t.identifier; jOn=true;
  moveJ(t);
},{passive:false});

jWrap.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches) if(t.identifier===jId) moveJ(t);
},{passive:false});

function endJ(e){
  e.preventDefault();
  for(const t of e.changedTouches) if(t.identifier===jId) resetJ();
}
jWrap.addEventListener('touchend',endJ,{passive:false});
jWrap.addEventListener('touchcancel',endJ,{passive:false});

function moveJ(t){
  const r=jWrap.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const dx=t.clientX-cx, dy=t.clientY-cy;
  const dist=Math.hypot(dx,dy);
  const max=JR-KR;
  const cl=Math.min(dist,max);
  const a=Math.atan2(dy,dx);
  const kx=Math.cos(a)*cl, ky=Math.sin(a)*cl;
  jKnob.style.transform=`translate(calc(-50% + ${kx}px),calc(-50% + ${ky}px))`;
  jdx=kx/max; jdy=ky/max;
}
function resetJ(){
  jOn=false;jId=-1;jdx=0;jdy=0;
  jKnob.style.transform='translate(-50%,-50%)';
}

// ─── BOTÓN DISPARAR ──────────────────────────────────────────
let fireOn=false;
const fireBtn=document.getElementById('fire');
fireBtn.addEventListener('touchstart',e=>{
  e.preventDefault(); fireOn=true; fireBtn.classList.add('on');
},{passive:false});
function endFire(e){
  e.preventDefault(); fireOn=false; fireBtn.classList.remove('on');
}
fireBtn.addEventListener('touchend',endFire,{passive:false});
fireBtn.addEventListener('touchcancel',endFire,{passive:false});
// Mouse (PC)
fireBtn.addEventListener('mousedown',()=>{ fireOn=true; fireBtn.classList.add('on'); });
fireBtn.addEventListener('mouseup',()=>{ fireOn=false; fireBtn.classList.remove('on'); });

// ─── COLISIÓN AABB ───────────────────────────────────────────
function hit(ax,ay,aw,ah, bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

// ─── UPDATE ──────────────────────────────────────────────────
function update(ts,dt){
  if(state!=='play'||dt>200) return;

  // Movimiento jugador
  let dx=0,dy=0;
  if(keys['KeyW']||keys['ArrowUp'])    dy=-1;
  if(keys['KeyS']||keys['ArrowDown'])  dy= 1;
  if(keys['KeyA']||keys['ArrowLeft'])  dx=-1;
  if(keys['KeyD']||keys['ArrowRight']) dx= 1;
  if(jOn){ dx=jdx; dy=jdy; }
  else if(dx&&dy){ dx*=.707; dy*=.707; }
  player.x = Math.max(0,Math.min(W-player.w, player.x+dx*PSPD));
  player.y = Math.max(0,Math.min(H-player.h, player.y+dy*PSPD));
  if(player.inv>0) player.inv-=dt;

  // Jugador dispara (hacia arriba)
  pCd-=dt;
  if(pCd<=0 && (keys['Space']||fireOn)){
    pCd=PSCD;
    pBulls.push({ x:player.x+player.w/2-9, y:player.y-2, w:18,h:18, vx:0,vy:-7 });
  }

  // Mover balas jugador
  for(let i=pBulls.length-1;i>=0;i--){
    const b=pBulls[i];
    b.y+=b.vy;
    if(b.y+b.h<0){ pBulls.splice(i,1); continue; }
    // ¿Golpea al enemigo?
    if(hit(b.x,b.y,b.w,b.h, enemy.x,enemy.y,enemy.w,enemy.h)){
      pBulls.splice(i,1);
      if(enemy.inv<=0){
        enemy.hp=Math.max(0,enemy.hp-1);
        enemy.inv=480;
        updateBars();
        if(enemy.hp<=0){ endGame('win'); return; }
      }
    }
  }

  // IA enemigo: patrulla zona superior, cambia dirección
  enemy.dtimer-=dt;
  if(enemy.dtimer<=0){
    const tx=20+Math.random()*(W-SZ-40);
    const spd=1.3+Math.random()*.9;
    enemy.vx=Math.sign(tx-enemy.x||1)*spd;
    enemy.vy=Math.random()<.3 ? .9+Math.random()*.5 : 0;
    enemy.dtimer=700+Math.random()*1000;
  }
  enemy.x+=enemy.vx; enemy.y+=enemy.vy;
  const maxEY=H*.38;
  if(enemy.x<0){enemy.x=0;enemy.vx=Math.abs(enemy.vx);}
  if(enemy.x+enemy.w>W){enemy.x=W-enemy.w;enemy.vx=-Math.abs(enemy.vx);}
  if(enemy.y<0){enemy.y=0;enemy.vy=Math.abs(enemy.vy);}
  if(enemy.y>maxEY){enemy.y=maxEY;enemy.vy=-Math.abs(enemy.vy);}
  if(enemy.inv>0) enemy.inv-=dt;

  // Enemigo dispara apuntando al jugador
  eCd-=dt;
  if(eCd<=0){
    eCd=ESCD;
    const ex=enemy.x+enemy.w/2, ey=enemy.y+enemy.h;
    const px=player.x+player.w/2, py=player.y;
    const a=Math.atan2(py-ey,px-ex);
    const spd=4.2;
    eBulls.push({ x:ex-9,y:ey, w:18,h:18, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd });
  }

  // Mover balas enemigo
  for(let i=eBulls.length-1;i>=0;i--){
    const b=eBulls[i];
    b.x+=b.vx; b.y+=b.vy;
    if(b.y>H+20||b.x<-20||b.x>W+20){ eBulls.splice(i,1); continue; }
    if(player.inv<=0 && hit(b.x,b.y,b.w,b.h, player.x,player.y,player.w,player.h)){
      eBulls.splice(i,1);
      player.hp=Math.max(0,player.hp-1);
      player.inv=750;
      updateBars();
      if(player.hp<=0){ endGame('lose'); return; }
    }
  }

  // Colisión cuerpo a cuerpo
  if(player.inv<=0 && hit(player.x,player.y,player.w,player.h, enemy.x,enemy.y,enemy.w,enemy.h)){
    player.hp=Math.max(0,player.hp-1);
    player.inv=900;
    updateBars();
    if(player.hp<=0){ endGame('lose'); return; }
  }
}

// ─── DRAW ────────────────────────────────────────────────────
function drawEnt(e,img,inv,glow){
  ctx.save();
  if(inv && Math.floor(Date.now()/75)%2===0) ctx.globalAlpha=.28;
  ctx.shadowBlur=18; ctx.shadowColor=glow;
  ctx.beginPath();
  ctx.roundRect(e.x,e.y,e.w,e.h,8);
  ctx.clip();
  if(img){ ctx.drawImage(img,e.x,e.y,e.w,e.h); }
  else{ ctx.fillStyle=glow; ctx.fillRect(e.x,e.y,e.w,e.h); }
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // Fondo arena
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.85);
  g.addColorStop(0,'rgba(15,3,40,.65)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Línea zona peligro
  ctx.save();
  ctx.setLineDash([5,9]);
  ctx.strokeStyle='rgba(168,85,247,.2)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H*.38); ctx.lineTo(W,H*.38); ctx.stroke();
  ctx.restore();

  // Balas jugador ❤️
  ctx.font='16px serif'; ctx.textBaseline='top';
  for(const b of pBulls) ctx.fillText('❤️',b.x,b.y);

  // Balas enemigo 💀
  ctx.font='15px serif';
  for(const b of eBulls) ctx.fillText('💀',b.x,b.y);

  // Personajes
  drawEnt(player,imgP,player.inv>0,'#ff4d6d');
  drawEnt(enemy, imgE,enemy.inv >0,'#a855f7');

  // Vidas debajo del jugador
  ctx.font='10px serif';
  for(let i=0;i<player.maxHp;i++)
    ctx.fillText(i<player.hp?'❤️':'🖤', player.x+i*13, player.y+player.h+4);

  // Vidas encima del enemigo
  for(let i=0;i<enemy.maxHp;i++)
    ctx.fillText(i<enemy.hp?'💜':'🖤', enemy.x+i*11, enemy.y-15);
}

// ─── LOOP ────────────────────────────────────────────────────
function loop(ts){
  const dt=ts-lastTs; lastTs=ts;
  update(ts,dt);
  draw();
  if(running) rafId=requestAnimationFrame(loop);
}

// ─── HUD ─────────────────────────────────────────────────────
function updateBars(){
  document.getElementById('pBar').style.width=(player.hp/player.maxHp*100)+'%';
  document.getElementById('eBar').style.width=(enemy.hp /enemy.maxHp *100)+'%';
}

// ─── GAME OVER ───────────────────────────────────────────────
function endGame(res){
  state=res; running=false;
  cancelAnimationFrame(rafId);
  const ov=document.getElementById('over');
  const ti=document.getElementById('overTitle');
  const su=document.getElementById('overSub');
  if(res==='win'){
    ti.textContent='🎉 ¡Victoria!'; ti.className='win';
    su.textContent='Derrotaste al enemigo 💪';
  } else {
    ti.textContent='💀 ¡Derrota!'; ti.className='lose';
    su.textContent='El enemigo te venció… ¡inténtalo de nuevo!';
  }
  ov.classList.add('on');
}

document.getElementById('reBtn').addEventListener('click',()=>{
  document.getElementById('over').classList.remove('on');
  initGame();
});
</script>
